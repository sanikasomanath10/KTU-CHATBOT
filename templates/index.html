<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTU Assistant | Industrial Safety Engineering</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <h2>KTU Assistant</h2>
                </div>
                <p class="subtitle"> Notes Chatbot</p>
            </div>
            <div class="sidebar-actions">
                <button id="clear-btn" class="action-btn">
                    <i class="fa-solid fa-trash-can"></i>
                    <span>Clear Chat</span>
                </button>
                <div class="upload-container">
                    <input type="file" id="pdf-upload" accept=".pdf" multiple hidden>
                    <button id="upload-btn" class="action-btn primary-btn">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>Upload Textbooks</span>
                    </button>
                </div>
                <div class="upload-container" style="margin-top: 10px;">
                    <input type="file" id="qpaper-upload" accept=".pdf" hidden>
                    <button id="generate-key-btn" class="action-btn secondary-btn" style="background: rgba(255, 255, 255, 0.1);">
                        <i class="fa-solid fa-file-signature"></i>
                        <span>Generate Answer Key</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <h1>Ask questions from your PDF notes</h1>
            </header>
            
            <div class="chat-messages" id="chat-messages">
                <!-- Initial welcome message -->
                <div class="message assistant">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="content">Hello! I am the KTU Assistant. Ask me a question about your notes!</div>
                </div>
            </div>

            <div class="chat-input-container">
                <form id="chat-form" class="chat-form">
                    <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off" required>
                    <button type="submit" id="send-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Review Modal -->
    <div id="review-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Review Answer Key</h2>
                <button id="close-modal-btn" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <p>You can edit the answer key below before downloading.</p>
                <textarea id="answer-key-textarea"></textarea>
            </div>
            <div class="modal-footer">
                <button id="download-pdf-btn" class="primary-btn"><i class="fa-solid fa-download"></i> Download PDF</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
